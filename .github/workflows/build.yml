name: Build atuin binary cache
on:
  # Every night at 04:30 UTC. Rebuilds against the current tip of the flake's
  # nixpkgs input and pushes the resulting store paths to Cachix so
  # `nixos-rebuild` gets a cache hit.
  schedule:
    - cron: "30 4 * * *"
  # Rebuild when the flake or patch changes.
  push:
    branches: [main]
    paths:
      - flake.nix
      - flake.lock
      - patches/**
      - .github/workflows/build.yml
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

concurrency:
  group: build-atuin-cache
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # Needed so the nightly flake.lock bump can be committed back.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up Cachix
        uses: cachix/cachix-action@v16
        with:
          name: jzl-atuin
          # Create this secret in the repo: Settings -> Secrets and variables -> Actions.
          # Generate the token with: cachix authtoken (or from the Cachix web UI).
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Update flake lock to latest nixpkgs
        # On scheduled/manual runs, follow the input tip so the cache tracks what a
        # fresh `nixos-rebuild` will build. On push runs we build the committed lock as-is.
        # This does NOT force a rebuild: an unchanged atuin closure is substituted from the
        # Cachix cache above rather than recompiled.
        if: github.event_name != 'push'
        run: nix flake update
      - name: Build patched atuin
        run: nix build .#atuin --print-build-logs
      - name: Push and pin latest build (protect current atuin from Cachix GC)
        # `cachix push` blocks until the upload finishes, so the path is guaranteed to be
        # in the cache before we pin. The cachix-action daemon pushes asynchronously and
        # its post-build hook does NOT fire for substituted (cache-hit) paths, so relying
        # on it alone would race the pin or skip an unchanged closure entirely.
        #
        # --keep-revisions 1 keeps only the newest revision of the "atuin" pin, so each
        # night replaces the previous one and older closures are free to age out of GC.
        run: |
          cachix push jzl-atuin ./result
          cachix pin jzl-atuin atuin ./result --keep-revisions 1
      - name: Commit updated flake.lock
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- flake.lock; then
            echo "flake.lock unchanged, nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add flake.lock
            git commit -m "chore: bump flake.lock (nightly atuin cache build)"
            git push
          fi
